<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="アルバム『遊者』購入者限定ダウンロード。">
  <title>Download — 遊者</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <main class="container">
    <header class="page-hero">
      <p class="meta-label">Download</p>
      <h1>購入者限定</h1>
      <p class="subtitle text-muted">購入者向けデータ</p>

    <div class="download-box">

      <p class="desc">項目をタップすると、音源・歌詞・画像の取得ページ、または再生用YouTubeへ移動します</p>

      </ul>

      <p class="download-notice" id="download-notice"></p>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
